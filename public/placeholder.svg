  </defs>
  <rect x="0" y="0" width="400" height="300" fill="url(#bg)" rx="24" ry="24"/>
  <rect x="32" y="32" width="336" height="236" fill="none" stroke="rgba(148,163,184,0.8)" stroke-width="2" stroke-dasharray="8 6" rx="20" ry="20"/>
  <g transform="translate(200 150)">
